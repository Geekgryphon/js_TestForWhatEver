function Car(carSpec) {
    this.name = carSpec.name;
    this.model = carSpec.model;
    this.description = carSpec.description;
}

Car.prototype.drive = function() {
    console.log('Driving...');
};

function Audi(carSpec){
    Car.call(this, carSpec);
    this.engine = carSpec.engine;
    this.audiDrive = function(){
        console.log('Audi Driving...');
    }
}

Audi.prototype = Object.create(Car.prototype);
Audi.prototype.constructor = Audi;

let Promise = {
    then(){},
    catch(){},
    all(){},
}

//******************************************

function waitingFor(name){
    console.log(`Waiting for ${name}`);

    return new Promise((resolve,reject)=>{
        setTimeout(()=> {
            if(name === 'Mike'){
                reject(Error('Mike is always late!!!'));
            }else{
                resolve(name);
            }
        },2000);
    })
}

function waitForFriend(name){
    return function(){
        return waitingFor(name);
    }
}

function leave(){
    console.log('Great we have everyone!');
}

waitingFor('Abdi').then(waitForFriend('Thomas'))
          .then(waitForFriend('Michelle'))
          .then(waitForFriend('John'))
          .then(leave);
